apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

def keystorePropertiesFile = rootProject.file('keystore.properties')
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def bundledGemmaArtifact = file('../../.artifacts/gemma-4-E2B-it.litertlm')
def generatedBundledAssetsDir = layout.buildDirectory.dir('generated/beacon-bundled-assets').get().asFile
def generatedBundledModelsDir = new File(generatedBundledAssetsDir, 'models')
def stagedBundledGemmaFile = new File(generatedBundledModelsDir, 'gemma-4-E2B-it.litertlm')
def bundleGemmaInApk = providers.gradleProperty('beaconBundleGemmaInApk')
    .map { it.toBoolean() }
    .orElse(true)
    .get()
def arm64OnlyBuild = providers.gradleProperty('beaconArm64Only')
    .map { it.toBoolean() }
    .orElse(false)
    .get()

tasks.register('stageBundledGemmaE2B') {
    inputs.file(bundledGemmaArtifact)
    outputs.file(stagedBundledGemmaFile)

    doLast {
        if (!bundleGemmaInApk) {
            if (stagedBundledGemmaFile.exists() && !stagedBundledGemmaFile.delete()) {
                throw new GradleException("Failed to clear staged bundled model: ${stagedBundledGemmaFile.absolutePath}")
            }
            return
        }

        if (!bundledGemmaArtifact.exists()) {
            throw new GradleException("Bundled Gemma 4 E2B artifact is missing: ${bundledGemmaArtifact.absolutePath}")
        }

        stagedBundledGemmaFile.parentFile.mkdirs()
        if (stagedBundledGemmaFile.exists() && stagedBundledGemmaFile.length() == bundledGemmaArtifact.length()) {
            return
        }

        if (stagedBundledGemmaFile.exists() && !stagedBundledGemmaFile.delete()) {
            throw new GradleException("Failed to refresh staged bundled model: ${stagedBundledGemmaFile.absolutePath}")
        }

        try {
            java.nio.file.Files.createLink(
                stagedBundledGemmaFile.toPath(),
                bundledGemmaArtifact.toPath(),
            )
            logger.lifecycle("Beacon: staged Gemma 4 E2B via hard link at ${stagedBundledGemmaFile.absolutePath}")
        } catch (Exception ignored) {
            copy {
                from bundledGemmaArtifact
                into stagedBundledGemmaFile.parentFile
                rename { 'gemma-4-E2B-it.litertlm' }
            }
            logger.lifecycle("Beacon: staged Gemma 4 E2B via file copy at ${stagedBundledGemmaFile.absolutePath}")
        }
    }
}

android {
    namespace = "com.beacon.sos"
    compileSdk = rootProject.ext.compileSdkVersion
    sourceSets {
        main {
            if (bundleGemmaInApk) {
                assets.srcDirs += generatedBundledAssetsDir.absolutePath
            }
            java {
                exclude 'io/flutter/plugins/**'
            }
        }
    }
    defaultConfig {
        applicationId "com.beacon.sos"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "0.1.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        if (arm64OnlyBuild) {
            ndk {
                abiFilters 'arm64-v8a'
            }
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (keystoreProperties['storeFile']) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig keystoreProperties['storeFile'] ? signingConfigs.release : signingConfigs.debug
        }
    }
    lint {
        checkDependencies false
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = '21'
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2"
    implementation "com.google.code.gson:gson:2.11.0"
    implementation "com.google.ai.edge.litertlm:litertlm-android:0.10.0"
    testImplementation "junit:junit:$junitVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

tasks.named('preBuild').configure {
    dependsOn 'stageBundledGemmaE2B'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
