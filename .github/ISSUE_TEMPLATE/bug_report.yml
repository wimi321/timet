name: Bug report / 缺陷反馈
description: Report a reproducible issue in Timet / 提交一个 Timet 可复现问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: platform
    attributes:
      label: Platform / 平台
      description: Which platform is affected? / 影响的是哪个平台？
      placeholder: Android 15 / iOS 18 / Web
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / 设备
      description: Which device are you using? / 你使用的设备是什么？
      placeholder: Pixel 8 Pro / iPhone 16 Pro
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps / 复现步骤
      description: List the exact steps to reproduce the issue. / 请按顺序写清如何复现。
      placeholder: |
        1. Open Timet
        2. Tap a route card or ask a question
        3. Ask a follow-up question
        4. Observe the failure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际行为
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area / 影响模块
      options:
        - Route engine / 路线引擎
        - Visual clue scan / 视觉线索扫描
        - Conversation state / 会话上下文
        - Knowledge pack / 知识包
        - Language / i18n / 多语言
        - Android native runtime / Android 原生运行时
        - iOS native runtime / iOS 原生运行时
        - Build / installation / 构建与安装
        - GitHub / docs / GitHub 与文档
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots / 日志或截图
      description: Paste any relevant logs or attach screenshots if available. / 可贴日志或上传截图。
