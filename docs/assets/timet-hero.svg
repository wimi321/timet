<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Timet hero artwork</title>
  <desc id="desc">A styled banner for Timet showing the prompt formula, routes, and structured answer format.</desc>
  <defs>
    <linearGradient id="bg" x1="84" y1="64" x2="1124" y2="656" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C1917"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F6EFE2"/>
      <stop offset="1" stop-color="#E8DCC6"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A16207"/>
      <stop offset="1" stop-color="#92400E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="36" y="36" width="1128" height="648" rx="32" fill="url(#bg)"/>
  <rect x="52" y="52" width="1096" height="616" rx="26" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>

  <!-- Subtle grid -->
  <g opacity="0.08">
    <path d="M108 160H1092" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M108 220H1092" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M108 280H1092" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M108 340H1092" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M108 400H1092" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M108 460H1092" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M108 520H1092" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M108 580H1092" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M200 92V628" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M340 92V628" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M480 92V628" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M620 92V628" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M760 92V628" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M900 92V628" stroke="#F5F5F4" stroke-width="1"/>
    <path d="M1040 92V628" stroke="#F5F5F4" stroke-width="1"/>
  </g>

  <!-- LEFT CARD -->
  <g filter="url(#shadow)">
    <rect x="80" y="80" width="520" height="560" rx="28" fill="#111827" stroke="#FFFFFF" stroke-opacity="0.08"/>

    <!-- TIMET label -->
    <text x="120" y="138" fill="#FCD34D" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700" letter-spacing="0.25em">TIMET</text>

    <!-- Headline -->
    <text x="120" y="204" fill="#FAFAF9" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="800">An app for</text>
    <text x="120" y="258" fill="#FAFAF9" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="800">time travelers.</text>

    <!-- Subtitle -->
    <text x="120" y="306" fill="#D6D3D1" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500">Route-first strategy for wealth, influence,</text>
    <text x="120" y="332" fill="#D6D3D1" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500">cover, and modern-edge leverage.</text>

    <!-- On-device badge -->
    <rect x="120" y="348" width="280" height="22" rx="4" fill="none"/>
    <text x="120" y="364" fill="#FB923C" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600">Powered by Gemma 4 — runs 100% on your phone, offline.</text>

    <!-- Prompt formula box -->
    <rect x="120" y="368" width="448" height="54" rx="14" fill="#FAFAF9" fill-opacity="0.06" stroke="#FAFAF9" stroke-opacity="0.12"/>
    <text x="142" y="402" fill="#F5F5F4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">era + place + identity + resources + goal</text>

    <!-- Route chips row 1 -->
    <rect x="120" y="454" width="144" height="40" rx="20" fill="url(#chip)"/>
    <text x="148" y="479" fill="#FEF3C7" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">Fortune Line</text>

    <rect x="276" y="454" width="126" height="40" rx="20" fill="#1F2937" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <text x="300" y="479" fill="#E7E5E4" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">Power Line</text>

    <!-- Route chips row 2 -->
    <rect x="120" y="506" width="156" height="40" rx="20" fill="#1F2937" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <text x="144" y="531" fill="#E7E5E4" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">Fatal Mistakes</text>

    <rect x="288" y="506" width="144" height="40" rx="20" fill="#1F2937" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <text x="314" y="531" fill="#E7E5E4" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">Modern Edge</text>

    <!-- Visual Clues chip -->
    <rect x="120" y="558" width="148" height="40" rx="20" fill="#1F2937" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <text x="144" y="583" fill="#E7E5E4" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">Visual Clues</text>
  </g>

  <!-- RIGHT CARD -->
  <g filter="url(#shadow)">
    <rect x="640" y="100" width="480" height="520" rx="28" fill="url(#card)"/>

    <!-- Header bar -->
    <rect x="672" y="132" width="416" height="52" rx="14" fill="#111827"/>
    <text x="700" y="165" fill="#FCD34D" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800">Answer Contract</text>

    <!-- Section 1 -->
    <text x="684" y="234" fill="#292524" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800">1. Current Read</text>
    <text x="684" y="260" fill="#57534E" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500">Read the board before you move.</text>

    <!-- Section 2 -->
    <text x="684" y="308" fill="#292524" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800">2. First Three Moves</text>
    <text x="684" y="334" fill="#57534E" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500">Low-barrier, repeatable first steps.</text>

    <!-- Section 3 -->
    <text x="684" y="382" fill="#292524" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800">3. Riches / Power Path</text>
    <text x="684" y="408" fill="#57534E" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500">Stabilize cash flow, then climb.</text>

    <!-- Section 4 -->
    <text x="684" y="456" fill="#292524" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800">4. Do Not Expose</text>
    <text x="684" y="482" fill="#57534E" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500">Never sound miraculous or modern.</text>

    <!-- Section 5 -->
    <text x="684" y="530" fill="#292524" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="800">5. Ask Me Next</text>
    <text x="684" y="556" fill="#57534E" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500">Break into 7, 30, and 90-day phases.</text>
  </g>
</svg>
