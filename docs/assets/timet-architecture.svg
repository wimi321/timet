<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">Timet architecture diagram</title>
  <desc id="arch-desc">Dual-stack architecture: React frontend communicates with Dart backend through a native bridge layer, powering on-device AI inference and offline knowledge retrieval.</desc>
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C1917"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FCD34D"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="560" rx="24" fill="url(#abg)"/>
  <rect x="1" y="1" width="1198" height="558" rx="23" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2" fill="none"/>

  <!-- Title -->
  <text x="600" y="52" fill="#FCD34D" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="0.2em" text-anchor="middle">ARCHITECTURE</text>

  <!-- ═══ ROW 1: Frontend ═══ -->
  <!-- User Input -->
  <rect x="60" y="90" width="160" height="72" rx="16" fill="#1F2937" stroke="#FCD34D" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="140" y="120" fill="#FCD34D" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em" text-anchor="middle">USER INPUT</text>
  <text x="140" y="142" fill="#A8A29E" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" text-anchor="middle">era + place + identity</text>

  <!-- Arrow -->
  <line x1="220" y1="126" x2="268" y2="126" stroke="#FCD34D" stroke-opacity="0.6" stroke-width="1.5"/>
  <polygon points="268,121 278,126 268,131" fill="#FCD34D" fill-opacity="0.6"/>

  <!-- React UI -->
  <rect x="280" y="82" width="260" height="88" rx="16" fill="#111827" stroke="#61DAFB" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="410" y="112" fill="#61DAFB" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" text-anchor="middle">React 18 + TypeScript</text>
  <text x="410" y="134" fill="#A8A29E" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" text-anchor="middle">App.tsx → HeroPanel, RouteGrid,</text>
  <text x="410" y="150" fill="#A8A29E" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" text-anchor="middle">ChatMessages, ModelPanel</text>

  <!-- Arrow -->
  <line x1="540" y1="126" x2="588" y2="126" stroke="#FCD34D" stroke-opacity="0.6" stroke-width="1.5"/>
  <polygon points="588,121 598,126 588,131" fill="#FCD34D" fill-opacity="0.6"/>

  <!-- Native bridge layer -->
  <rect x="600" y="82" width="220" height="88" rx="16" fill="#1F2937" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="710" y="110" fill="#FCD34D" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" text-anchor="middle">Native Bridge</text>
  <text x="710" y="132" fill="#D6D3D1" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">AsyncIterable&lt;StreamChunk&gt;</text>
  <text x="710" y="150" fill="#78716C" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" text-anchor="middle">80ms UI flush interval</text>

  <!-- Arrow -->
  <line x1="820" y1="126" x2="868" y2="126" stroke="#FCD34D" stroke-opacity="0.6" stroke-width="1.5"/>
  <polygon points="868,121 878,126 868,131" fill="#FCD34D" fill-opacity="0.6"/>

  <!-- 5-Part Response -->
  <rect x="880" y="90" width="260" height="72" rx="16" fill="#1F2937" stroke="#22C55E" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="1010" y="116" fill="#22C55E" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">STRUCTURED 5-PART RESPONSE</text>
  <text x="1010" y="140" fill="#A8A29E" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" text-anchor="middle">Read → Moves → Path → Avoid → Next</text>

  <!-- ═══ ROW 2: Bridge implementations ═══ -->
  <rect x="600" y="200" width="220" height="108" rx="14" fill="#111827" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Capacitor bridge -->
  <rect x="618" y="214" width="184" height="26" rx="8" fill="#119EFF" fill-opacity="0.15" stroke="#119EFF" stroke-opacity="0.4" stroke-width="1"/>
  <text x="710" y="232" fill="#7DD3FC" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">capacitorBridge.ts</text>

  <!-- Strict bridge -->
  <rect x="618" y="246" width="184" height="26" rx="8" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
  <text x="710" y="264" fill="#A8A29E" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">strictBridge.ts</text>

  <!-- Mock bridge -->
  <rect x="618" y="278" width="184" height="26" rx="8" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
  <text x="710" y="296" fill="#A8A29E" font-family="ui-monospace, monospace" font-size="11" font-weight="600" text-anchor="middle">mockBridge.ts</text>

  <!-- Vertical connector from bridge box to implementations -->
  <line x1="710" y1="170" x2="710" y2="200" stroke="#FCD34D" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- ═══ ROW 3: Backend ═══ -->

  <!-- Arrow from capacitor bridge down -->
  <line x1="710" y1="308" x2="710" y2="348" stroke="#119EFF" stroke-opacity="0.4" stroke-width="1.5"/>
  <polygon points="705,348 710,358 715,348" fill="#119EFF" fill-opacity="0.4"/>

  <!-- Capacitor shell -->
  <rect x="60" y="360" width="220" height="88" rx="16" fill="#111827" stroke="#119EFF" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="170" y="392" fill="#119EFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" text-anchor="middle">Capacitor 8</text>
  <text x="170" y="412" fill="#A8A29E" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" text-anchor="middle">Web → Android → iOS</text>
  <text x="170" y="430" fill="#78716C" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" text-anchor="middle">Camera · Haptics · Filesystem</text>

  <!-- Arrow from Capacitor to Dart -->
  <line x1="280" y1="404" x2="388" y2="404" stroke="#119EFF" stroke-opacity="0.4" stroke-width="1.5"/>
  <polygon points="388,399 398,404 388,409" fill="#119EFF" fill-opacity="0.4"/>

  <!-- Dart backend -->
  <rect x="400" y="360" width="280" height="88" rx="16" fill="#111827" stroke="#0175C2" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="540" y="390" fill="#0EA5E9" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" text-anchor="middle">Dart Backend</text>
  <text x="540" y="412" fill="#D6D3D1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" text-anchor="middle">LiteRT Runtime · RAG Retrieval</text>
  <text x="540" y="430" fill="#78716C" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" text-anchor="middle">Isar Storage · Resumable Downloads</text>

  <!-- Arrow from Dart to Gemma -->
  <line x1="680" y1="404" x2="758" y2="404" stroke="#FF6F00" stroke-opacity="0.5" stroke-width="1.5"/>
  <polygon points="758,399 768,404 758,409" fill="#FF6F00" fill-opacity="0.5"/>

  <!-- Gemma 4 model -->
  <rect x="770" y="360" width="180" height="88" rx="16" fill="#1F2937" stroke="#FF6F00" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="860" y="390" fill="#FB923C" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" text-anchor="middle">Gemma 4</text>
  <text x="860" y="412" fill="#D6D3D1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" text-anchor="middle">E2B (2B) · E4B (4B)</text>
  <text x="860" y="430" fill="#78716C" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" text-anchor="middle">On-Device via LiteRT</text>

  <!-- Arrow from Dart to Knowledge -->
  <line x1="540" y1="448" x2="540" y2="478" stroke="#0175C2" stroke-opacity="0.4" stroke-width="1.5"/>
  <polygon points="535,478 540,488 545,478" fill="#0175C2" fill-opacity="0.4"/>

  <!-- ═══ ROW 4: Knowledge ═══ -->
  <!-- Knowledge Pack -->
  <rect x="340" y="490" width="400" height="54" rx="14" fill="#111827" stroke="#A16207" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="540" y="516" fill="#FCD34D" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">OFFLINE KNOWLEDGE PACK</text>
  <text x="540" y="534" fill="#78716C" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" text-anchor="middle">entry_seed.json → build script → generatedKnowledge.ts + generated_knowledge.dart</text>

  <!-- i18n badge -->
  <rect x="60" y="490" width="220" height="54" rx="14" fill="#111827" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
  <text x="170" y="516" fill="#D6D3D1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">i18n · 8 Languages</text>
  <text x="170" y="534" fill="#78716C" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" text-anchor="middle">en zh ja ko es fr de</text>

  <!-- Offline badge -->
  <rect x="800" y="490" width="180" height="54" rx="14" fill="#111827" stroke="#22C55E" stroke-opacity="0.3" stroke-width="1"/>
  <text x="890" y="516" fill="#22C55E" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">100% Offline-First</text>
  <text x="890" y="534" fill="#78716C" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" text-anchor="middle">No server required</text>

  <!-- Vertical connector: Bridge box to Capacitor -->
  <path d="M618,270 L400,270 L400,340 L170,340 L170,360" stroke="#119EFF" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4 3" fill="none"/>
</svg>
